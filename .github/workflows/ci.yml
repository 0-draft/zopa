name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig build (debug)
        run: zig build

      - name: zig build (release-small)
        run: zig build --release=small

      - name: report wasm size
        run: |
          ls -l zig-out/bin/zopa.wasm
          wc -c zig-out/bin/zopa.wasm

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: zopa.wasm
          path: zig-out/bin/zopa.wasm
          if-no-files-found: error

  test-node:
    name: test (node)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: zig build test
        run: zig build test

  test-wasmtime:
    name: test (wasmtime)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: test/requirements.txt

      - name: install python deps
        run: |
          python -m venv .venv-test
          .venv-test/bin/pip install -r test/requirements.txt

      - name: zig build test-wasmtime
        run: zig build test-wasmtime
